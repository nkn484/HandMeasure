name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python replay dependencies
        run: python -m pip install opencv-python-headless

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests and demo debug assemble
        run: ./gradlew --no-daemon :handmeasure-core:test :handtryon-core:test :HandMeasure:compileDebugKotlin :HandMeasure:testDebugUnitTest :HandTryOn:compileDebugKotlin :HandTryOn:testDebugUnitTest :app:compileDebugKotlin :app:assembleDebug

      - name: Python replay annotation validation
        run: |
          python tools/tryon/replay_validation.py \
            --annotations validation/tryon/reference-annotations/video-fixture-2026-04-29.json \
            --image-dir validation/tryon/reference-images \
            --predictions validation/tryon/captures/video-fixture-2026-04-29.landmark-predictions.json \
            --fixture-manifest validation/tryon/reference-annotations/fixture-manifest.json \
            --report-dir build/tryon-replay-validation \
            --center-ratio-threshold 0.35 \
            --min-center-ratio-pass-rate 0.85 \
            --steady-scale-delta-threshold 0.12 \
            --steady-rotation-jitter-threshold 8.0 \
            --min-steady-pass-rate 0.85 \
            --strict-gate

      - name: Upload demo debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
